<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Website with Launch Popup</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
    }

    /* Overlay background */
    .popup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    /* Popup box */
    .popup-box {
      background: white;
      width: 400px;
      max-width: 90%;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      position: relative;
      animation: fadeIn 0.3s ease-in-out;
    }

    .popup-content {
      white-space: pre-line;
      margin-bottom: 20px;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 12px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      background: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>

  <h1 style="padding:20px;">Main Website Content</h1>

  <!-- Popup -->
  <div id="popup" class="popup-overlay">
    <div class="popup-box">
      <button class="close-btn" onclick="closePopup()">✖</button>
      <div id="popupText" class="popup-content">
        Loading...
      </div>
    </div>
  </div>

  <script>
    // Load text from external file
    fetch('popup.txt')
      .then(response => response.text())
      .then(data => {
        document.getElementById('popupText').innerText = data;
      })
      .catch(error => {
        document.getElementById('popupText').innerText =
          "Unable to load popup content.";
      });

    function closePopup() {
      document.getElementById('popup').style.display = 'none';
    }
  </script>

</body>
</html>
